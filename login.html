<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCSS | Ingreso al Sistema</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <h1>Citas Virtuales CCSS</h1>
        </div>
    </header>
    <main>
        <div style="max-width: 450px; margin: 4rem auto;">
            <section class="form-card-container">
                <h3 style="color: var(--primary-blue); margin-bottom: 1.5rem; text-align: center;">Validación de Asegurado</h3>
                <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">
                    Ingrese su cédula para verificar su estado de aseguramiento con la CCSS.
                </p>
                <form id="formulario-login">
                    <div class="form-group">
                        <label for="cedula-login">Número de Cédula (9 dígitos)</label>
                        <input type="text" id="cedula-login" class="form-control" placeholder="Ej: 115480236">
                        <span id="error-login" class="alert-error"></span>
                    </div>
                    <button type="submit" class="btn-ccss" style="background-color: var(--primary-blue); color: white; width: 100%; border: none; margin-top: 1rem;">Verificar e Ingresar</button>
                </form>
            </section>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Caja Costarricense de Seguro Social. UTN Laboratorio Técnico.</p>
    </footer>
    <script src="js/login.js"></script>
</body>
</html>
