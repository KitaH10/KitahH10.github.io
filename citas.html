<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCSS | Buscar Citas Disponibles</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/auth.js"></script>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>Citas Virtuales CCSS</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="citas.html" class="active">Buscar Citas</a></li>
                <li><a href="registro.html">Registrar Cita</a></li>
                <li><a href="historial.html">Historial de Citas</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div style="text-align: center; margin-bottom: 3rem;">
            <h2 style="color: var(--primary-blue); font-size: 2rem; margin-bottom: 0.5rem;">Horarios Disponibles</h2>
            <p style="color: #64748b;">A continuación se le presentan los horarios disponibles para agendar su cita médica.</p>
        </div>

        <section class="search-section">
            <div class="form-group" style="flex: 2; min-width: 280px; margin-bottom: 0;">
                <label for="buscar-texto">Búsqueda rápida</label>
                <input type="text" id="buscar-texto" class="form-control" placeholder="Busque por nombre de centro médico, cantón o provincia">
            </div>
            
            <div class="form-group" style="flex: 1; min-width: 200px; margin-bottom: 0;">
                <label for="filtro-centro">Tipo de Centro Médico</label>
                <select id="filtro-centro" class="form-control">
                    <option value="todos">Todos los centros</option>
                </select>
            </div>
        </section>

        <section id="contenedor-citas" class="grid-citas"></section>
    </main>

    <footer>
        <p>&copy; 2026 Caja Costarricense de Seguro Social.</p>
    </footer>

    <script src="js/citas.js"></script>
</body>
</html>
